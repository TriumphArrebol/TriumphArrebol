<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech style animated banner</title>
  <desc id="desc">Neon gradient background with animated scan lines, pulse rings, and flowing data dots.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050814"/>
      <stop offset="0.5" stop-color="#0A1735"/>
      <stop offset="1" stop-color="#11082A"/>
    </linearGradient>

    <linearGradient id="line" x1="0" y1="160" x2="1200" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#7C4DFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0.1"/>
    </linearGradient>

    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 160) rotate(90) scale(130 130)">
      <stop stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#4FC3F7" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="40 40" dur="6s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#glow)">
    <path d="M0 180 C 180 100, 360 230, 600 160 C 840 90, 1020 210, 1200 140" stroke="url(#line)" stroke-width="3" fill="none"/>
    <path d="M0 200 C 190 130, 370 250, 600 180 C 860 100, 1020 240, 1200 170" stroke="#00E5FF" stroke-opacity="0.25" stroke-width="1.5" fill="none"/>
  </g>

  <circle cx="600" cy="160" r="16" fill="#00E5FF" filter="url(#glow)">
    <animate attributeName="r" values="14;19;14" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="160" r="28" stroke="#00E5FF" stroke-opacity="0.75" fill="none">
    <animate attributeName="r" values="28;90" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="160" r="48" stroke="#7C4DFF" stroke-opacity="0.65" fill="none">
    <animate attributeName="r" values="48;120" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <g fill="#00E5FF" filter="url(#glow)">
    <circle cx="120" cy="120" r="3">
      <animate attributeName="cx" values="120;1080" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="220" r="2.8">
      <animate attributeName="cx" values="1080;140" dur="8s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.85;1" dur="8s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="265" r="2.6">
      <animate attributeName="cx" values="240;980" dur="7.2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="265;120" dur="7.2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="7.2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect y="0" width="1200" height="320" fill="url(#pulse)" opacity="0.32"/>

  <text x="50%" y="52%" text-anchor="middle" fill="#D1F5FF" font-size="36" font-family="'Segoe UI', 'Inter', sans-serif" letter-spacing="4" font-weight="600">
    FUTURE // IN PROGRESS
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.6s" repeatCount="indefinite"/>
  </text>
</svg>
